<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>sulasok</title>
    
    <link rel="icon" type="image/png" href="download.png">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Light Pink Background */
            background-color: #fff0f5; 
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            /* Soft Pinkish Shadow */
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4); 
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ffdae0;
        }
        h1 {
            text-align: center;
            /* Strong Pink Title */
            color: #d81b60; 
            margin-top: 0;
            letter-spacing: 1px;
        }
        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
            margin-bottom: 5px;
            color: #ad1457;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #fce4ec;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #f06292;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .controls > div {
            flex: 1;
        }
        button {
            /* Vibrant Pink Button */
            background-color: #f06292;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:hover {
            background-color: #e91e63;
        }
        button:active {
            transform: scale(0.98);
        }
        .output-section {
            margin-top: 25px;
            border-top: 2px dashed #f8bbd0;
            padding-top: 20px;
        }
        .watermark {
            margin-top: 30px;
            margin-bottom: 20px;
            text-align: center;
            color: #f06292;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.8;
        }
        /* Custom scrollbar for a cute look */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #f8bbd0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>sulasok</h1>
    
    <label for="mainText">1. Paste your full text here:</label>
    <textarea id="mainText" rows="10" placeholder="Paste the entire document or long text here..."></textarea>

    <div class="controls">
        <div>
            <label for="findText">2. Text to Find:</label>
            <textarea id="findText" rows="6" placeholder="Paste the text you want to find..."></textarea>
        </div>
        <div>
            <label for="replaceText">3. Replace With:</label>
            <textarea id="replaceText" rows="6" placeholder="Paste the new text here..."></textarea>
        </div>
    </div>

    <button onclick="performReplace()">Replace All Matches</button>

    <div class="output-section">
        <label for="outputText">Result:</label>
        <textarea id="outputText" rows="10" placeholder="Your modified text will appear here..." readonly style="background-color: #fff9fa;"></textarea>
    </div>
</div>

<div class="watermark">
    &copy; 2026 Made by Vincent
</div>

<script>
    function performReplace() {
        const mainText = document.getElementById('mainText').value;
        const findText = document.getElementById('findText').value;
        const replaceText = document.getElementById('replaceText').value;

        if (!findText) {
            alert("Please enter the text you want to find.");
            return;
        }

        const resultText = mainText.split(findText).join(replaceText);
        document.getElementById('outputText').value = resultText;
        
        if (mainText === resultText && mainText !== "") {
            alert("No matches found! Check for exact matching.");
        }
    }
</script>

</body>
</html>
