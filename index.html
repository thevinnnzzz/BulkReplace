<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Text Find and Replace</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
            margin-bottom: 5px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .controls > div {
            flex: 1;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .output-section {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        /* Watermark Styles */
        .watermark {
            margin-top: 30px;
            margin-bottom: 20px;
            text-align: center;
            color: #95a5a6;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bulk Find & Replace</h1>
    
    <label for="mainText">1. Paste your full text here:</label>
    <textarea id="mainText" rows="10" placeholder="Paste the entire document or long text here..."></textarea>

    <div class="controls">
        <div>
            <label for="findText">2. Paragraph/Text to Find:</label>
            <textarea id="findText" rows="6" placeholder="Paste the exact 500+ word paragraph you want to find..."></textarea>
        </div>
        <div>
            <label for="replaceText">3. Replace With:</label>
            <textarea id="replaceText" rows="6" placeholder="Paste the new text you want to replace it with..."></textarea>
        </div>
    </div>

    <button onclick="performReplace()">Replace All Matches</button>

    <div class="output-section">
        <label for="outputText">Result:</label>
        <textarea id="outputText" rows="10" placeholder="Your modified text will appear here..." readonly></textarea>
    </div>
</div>

<div class="watermark">
    &copy; 2026 Made by Vincent
</div>

<script>
    function performReplace() {
        // Get the values from the text areas
        const mainText = document.getElementById('mainText').value;
        const findText = document.getElementById('findText').value;
        const replaceText = document.getElementById('replaceText').value;

        // Check if the "Find" box is empty
        if (!findText) {
            alert("Please enter the text you want to find.");
            return;
        }

        // Split and join trick to bypass regex special character issues
        const resultText = mainText.split(findText).join(replaceText);

        // Put the result in the output box
        document.getElementById('outputText').value = resultText;
        
        // Alert the user if no matches were found
        if (mainText === resultText) {
            alert("No matches found! Make sure the 'Text to Find' exactly matches the original text (including spaces and line breaks).");
        }
    }
</script>

</body>
</html>
